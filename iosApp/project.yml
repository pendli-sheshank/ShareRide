name: iosApp
options:
  bundleIdPrefix: com.shareride
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - iosApp
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleName: SawaariShare
        CFBundleDisplayName: SawaariShare
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.shareride
            CFBundleURLName: com.shareride.ios
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        # Injected at build time from Config.xcconfig / CI secrets
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shareride.ios
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(APPLE_TEAM_ID)
        ENABLE_BITCODE: NO
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"
        # Build settings picked up from Config.xcconfig (local) or xcodebuild env vars (CI)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    dependencies:
      - package: Supabase
        product: Auth
      - package: Supabase
        product: PostgREST
