pluginManagement {
    def flutterSdkPath = System.getenv("FLUTTER_SDK")
    if (flutterSdkPath == null) {
        flutterSdkPath = System.getenv("FLUTTER_ROOT")
    }
    if (flutterSdkPath == null) {
        throw new GradleException("Neither FLUTTER_SDK nor FLUTTER_ROOT environment variable found")
    }

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

include ":app"
