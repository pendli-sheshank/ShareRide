name: Generate iOS Project Files

on:
  workflow_dispatch:  # Manual trigger - click "Run workflow" in GitHub Actions

jobs:
  generate-ios:
    name: Generate iOS Project
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true

      - name: Verify macOS environment
        run: |
          echo "macOS version:"
          sw_vers
          echo ""
          echo "Xcode version:"
          xcode-select --version
          echo ""
          echo "Flutter version:"
          flutter --version
          echo ""
          echo "CocoaPods:"
          pod --version

      - name: Install CocoaPods (if needed)
        run: sudo gem install cocoapods

      - name: Clean and prepare
        working-directory: flutter_app
        run: |
          flutter clean
          flutter pub get

      - name: Generate iOS project files
        working-directory: flutter_app
        run: |
          echo "Generating iOS project files..."
          flutter create . --platforms=ios --org com.sawaarishare
          echo "✅ iOS project generated successfully"

      - name: Install iOS dependencies
        working-directory: flutter_app/ios
        run: |
          echo "Installing CocoaPods dependencies..."
          pod install --repo-update
          echo "✅ CocoaPods dependencies installed"

      - name: Verify iOS build
        working-directory: flutter_app
        run: |
          echo "Building iOS project to verify setup..."
          flutter build ios --release --no-codesign 2>&1 | head -100
          echo "✅ iOS project structure verified"

      - name: Create artifacts directory
        run: |
          mkdir -p ios-artifacts
          cd flutter_app
          # Create tar of iOS directory (excluding build artifacts)
          tar -czf ../ios-artifacts/ios-project.tar.gz \
            --exclude='ios/Pods' \
            --exclude='ios/.symlinks' \
            --exclude='ios/Flutter/Flutter.framework' \
            ios/
          echo "✅ Created iOS project archive"

      - name: Upload iOS project files
        uses: actions/upload-artifact@v4
        with:
          name: ios-project-files
          path: ios-artifacts/ios-project.tar.gz
          retention-days: 30

      - name: Prepare files for commit
        working-directory: flutter_app
        run: |
          echo "Generated files:"
          ls -la ios/ | head -20
          echo ""
          echo "Key files created:"
          [ -d "ios/Runner.xcodeproj" ] && echo "✅ Runner.xcodeproj" || echo "❌ Runner.xcodeproj"
          [ -d "ios/Runner" ] && echo "✅ Runner/" || echo "❌ Runner/"
          [ -d "ios/Flutter" ] && echo "✅ Flutter/" || echo "❌ Flutter/"
          [ -f "ios/Podfile.lock" ] && echo "✅ Podfile.lock" || echo "❌ Podfile.lock"

      - name: Commit iOS files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"

          cd flutter_app

          # Check if there are changes
          if [ -n "$(git status --porcelain ios/)" ]; then
            git add ios/
            git commit -m "Auto-generate iOS project files via CI

Generated by GitHub Actions macOS runner.

New files created:
- ios/Runner.xcodeproj/ (Xcode project)
- ios/Runner/ (iOS app source)
- ios/Flutter/ (Flutter configuration)
- ios/Pods/ (CocoaPods dependencies)
- ios/Podfile.lock (Dependency lock file)

Next steps: See FIREBASE_IOS_SETUP.md for configuration instructions."
            git push origin ${{ github.ref }}
            echo "✅ Committed iOS files"
          else
            echo "⚠️ No changes to commit (iOS files may already exist)"
          fi

      - name: Summary
        run: |
          echo "📋 iOS Project Generation Complete!"
          echo "===================================="
          echo ""
          echo "Generated files are now in flutter_app/ios/"
          echo ""
          echo "Next manual steps in Xcode:"
          echo "1. Add GoogleService-Info.plist to project"
          echo "2. Add Firebase libraries via Swift Package Manager"
          echo "3. Build and test"
          echo ""
          echo "Download the complete iOS project:"
          echo "- Go to Actions > Generate iOS Project Files"
          echo "- Download 'ios-project-files' artifact"
          echo ""
          echo "View committed changes:"
          echo "- Check the new commit in the branch"
          echo "- Review ios/ directory changes"
