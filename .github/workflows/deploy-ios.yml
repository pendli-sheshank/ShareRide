name: Deploy iOS to TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS production app
        run: eas build --platform ios --profile production --non-interactive --wait

      - name: Write App Store Connect API key
        run: printf '%s\n' "$ASC_API_KEY" > asc-api-key.p8
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}

      - name: Submit to TestFlight
        run: eas submit --platform ios --latest --profile production --non-interactive
