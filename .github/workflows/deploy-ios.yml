name: Deploy iOS → TestFlight

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Marketing version (e.g. 1.0.1)"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - 'iosApp/**'
      - '.github/workflows/deploy-ios.yml'

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # ── XcodeGen: generate .xcodeproj from project.yml ───────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── Create Config.xcconfig from secrets (no keys in source) ─────────
      - name: Create Config.xcconfig
        working-directory: iosApp
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > Config.xcconfig << EOF
          SUPABASE_URL = ${SUPABASE_URL}
          SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY}
          APPLE_TEAM_ID = ${APPLE_TEAM_ID}
          CURRENT_PROJECT_VERSION = ${{ github.run_number }}
          MARKETING_VERSION = ${{ github.event.inputs.version_name || '1.0.0' }}
          EOF

      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate

      # ── Resolve Swift Package Manager dependencies ────────────────────────
      - name: Resolve Swift packages
        working-directory: iosApp
        run: xcodebuild -resolvePackageDependencies -project iosApp.xcodeproj -scheme iosApp

      # ── Write App Store Connect API key for automatic signing ─────────────
      - name: Write ASC API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode \
            > ~/.private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      # ── Archive ──────────────────────────────────────────────────────────
      - name: Archive
        working-directory: iosApp
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -archivePath ../SawaariShare.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_API_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            | xcpretty

      # ── Export IPA (method: app-store) ────────────────────────────────────
      - name: Export IPA
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath SawaariShare.xcarchive \
            -exportPath SawaariShare-ipa \
            -exportOptionsPlist iosApp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_API_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            | xcpretty

      # ── Upload to TestFlight ──────────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f SawaariShare-ipa/iosApp.ipa \
            -t ios \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      # ── Save IPA as artifact (30 days) ────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sawaari-share-ios-${{ github.run_number }}
          path: SawaariShare-ipa/*.ipa
          retention-days: 30
