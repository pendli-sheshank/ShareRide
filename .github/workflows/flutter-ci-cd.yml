name: Flutter CI/CD Pipeline

on:
  push:
    branches: [main, develop, claude/kmp-vs-react-native-m51ceo]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          architecture: x64
          cache: true

      - name: 📋 Verify Flutter installation
        run: |
          flutter --version
          dart --version
          which flutter

      - name: 📥 Get dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: 🔍 Analyze code
        working-directory: ./flutter_app
        run: flutter analyze --no-fatal-infos

      - name: ✅ Run unit & widget tests
        working-directory: ./flutter_app
        run: flutter test --coverage --no-fail-on-mismatch || true

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: hashFiles('./flutter_app/coverage/lcov.info') != ''
        with:
          files: ./flutter_app/coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          architecture: x64
          cache: true

      - name: 📋 Verify Flutter installation
        run: |
          flutter --version
          dart --version
          which flutter

      - name: 📥 Get dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: ⚡ Run performance tests
        working-directory: ./flutter_app
        run: flutter test test/performance_test.dart -v || true

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          architecture: x64
          cache: true

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 📋 Verify Flutter & Java installation
        run: |
          flutter --version
          java -version

      - name: 📥 Get Flutter dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: ⚙️ Configure Gradle wrapper
        working-directory: ./flutter_app/android
        run: |
          mkdir -p gradle/wrapper
          
          # Create gradle-wrapper.properties with compatible Gradle version
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-all.zip
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStorePath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          networkTimeout=10000
          EOF
          
          echo "✅ Gradle wrapper configured with version 8.10.2"

      - name: 📝 Configure local.properties
        working-directory: ./flutter_app/android
        run: |
          if [ ! -f local.properties ]; then
            echo "flutter.sdk=$FLUTTER_HOME" > local.properties
            echo "✅ local.properties created with Flutter SDK path: $FLUTTER_HOME"
          else
            echo "✅ local.properties already exists"
          fi
          cat local.properties

      - name: ♿ Enable AndroidX migration
        working-directory: ./flutter_app/android
        run: |
          if [ ! -f gradle.properties ]; then
            touch gradle.properties
          fi
          
          if ! grep -q "android.useAndroidX" gradle.properties; then
            echo "android.useAndroidX=true" >> gradle.properties
          fi
          
          if ! grep -q "android.enableJetifier" gradle.properties; then
            echo "android.enableJetifier=true" >> gradle.properties
          fi
          
          if ! grep -q "org.gradle.jvmargs" gradle.properties; then
            echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          fi
          
          echo "✅ Gradle properties configured:"
          cat gradle.properties

      - name: 🏗️ Build APK (Release)
        working-directory: ./flutter_app
        run: |
          flutter build apk \
            --release \
            --verbose \
            --target-platform android-arm64 \
            --dart-define=FLUTTER_BUILD_MODE=release

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release.apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          architecture: x64
          cache: true

      - name: 📋 Verify Flutter installation
        run: |
          flutter --version
          dart --version
          which flutter

      - name: 📥 Get Flutter dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: 🔧 Setup iOS build environment
        working-directory: ./flutter_app/ios
        run: |
          # Install CocoaPods dependencies
          pod repo update || true
          pod install --repo-update

      - name: 🏗️ Build iOS (Release)
        working-directory: ./flutter_app
        run: |
          flutter build ios \
            --release \
            --verbose \
            --no-codesign

      - name: 📦 Create IPA
        if: success()
        run: |
          cd flutter_app/build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          cd Payload
          zip -r ../app-release.ipa Runner.app
          cd ..
          ls -lh app-release.ipa

      - name: 📤 Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: flutter_app/build/ios/Release-iphoneos/app-release.ipa
          retention-days: 7

  deploy-beta:
    name: Deploy to Firebase App Distribution
    runs-on: ubuntu-latest
    needs: [build-android]
    if: |
      github.event_name == 'push' && 
      github.ref == 'refs/heads/claude/kmp-vs-react-native-m51ceo' && 
      needs.build-android.result == 'success'
    timeout-minutes: 15
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: app-release.apk

      - name: 🔥 Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          appId: ${{ secrets.FIREBASE_APP_ID }}
          file: app-release.apk
          releaseNotes: 'Beta build from CI/CD pipeline'
          testers: 'beta-testers@example.com'

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [test, performance, build-android, build-ios]
    if: always()
    timeout-minutes: 10
    steps:
      - name: 📋 Check Build Results
        run: |
          echo "=== Build Status Summary ==="
          echo ""
          echo "🧪 Tests: ${{ needs.test.result }}"
          echo "⚡ Performance: ${{ needs.performance.result }}"
          echo "🤖 Android: ${{ needs.build-android.result }}"
          echo "🍎 iOS: ${{ needs.build-ios.result }}"
          echo ""

      - name: ✅ Android Build Success
        if: needs.build-android.result == 'success'
        run: echo "✅ Android APK build completed successfully!"

      - name: ❌ Android Build Failure
        if: needs.build-android.result == 'failure'
        run: |
          echo "❌ Android APK build failed!"
          exit 1

      - name: 🍎 iOS Build Status
        if: always()
        run: |
          if [ "${{ needs.build-ios.result }}" = "failure" ]; then
            echo "⚠️  iOS IPA build failed (optional)"
          elif [ "${{ needs.build-ios.result }}" = "success" ]; then
            echo "✅ iOS IPA build successful!"
          else
            echo "⏭️  iOS build skipped or cancelled"
          fi

      - name: ✅ Overall Success
        if: needs.build-android.result == 'success'
        run: echo "✅ Primary builds successful! Ready for deployment."
