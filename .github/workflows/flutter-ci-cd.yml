name: Flutter CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.22.0'
  FLUTTER_CHANNEL: 'stable'
  WORKING_DIR: './flutter_app'

jobs:
  # Quick validation before expensive builds
  validate:
    name: Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Verify Flutter
        run: |
          flutter --version
          which flutter

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Analyze code
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter analyze

      - name: Format check
        working-directory: ${{ env.WORKING_DIR }}
        run: dart format --set-exit-if-changed .

      - name: Pub audit
        working-directory: ${{ env.WORKING_DIR }}
        run: dart pub audit || true

  # Unit tests only (skip performance tests by default)
  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Verify Flutter
        run: |
          flutter --version
          which flutter

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Run tests
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: hashFiles('${{ env.WORKING_DIR }}/coverage/lcov.info') != ''
        with:
          files: ${{ env.WORKING_DIR }}/coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false

  # Parallel builds for speed
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Create local.properties
        working-directory: ${{ env.WORKING_DIR }}/android
        run: |
          echo "flutter.sdk=$FLUTTER_HOME" > local.properties
          cat local.properties

      - name: Get Flutter dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            -v

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: ${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: validate
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Check iOS project files
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: |
          if [ ! -d "Runner.xcodeproj" ]; then
            echo "❌ ERROR: Runner.xcodeproj not found in flutter_app/ios/"
            echo "iOS project files are missing from the repository."
            echo "To fix this locally:"
            echo "  1. On macOS with Flutter/Xcode installed, run: flutter create ."
            echo "  2. Commit the generated ios/ files to the repository"
            exit 1
          fi
          echo "✅ iOS project structure found"

      - name: Get Flutter dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: |
          pod install --repo-update 2>/dev/null || pod install

      - name: Build iOS
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            -v

      - name: Create IPA
        run: |
          cd ${{ env.WORKING_DIR }}/build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          cd Payload
          zip -r ../app-release.ipa Runner.app >/dev/null 2>&1
          cd ..
          ls -lh app-release.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: ${{ env.WORKING_DIR }}/build/ios/Release-iphoneos/app-release.ipa
          retention-days: 7

  # Deploy only from main branch
  deploy-android:
    name: Deploy Android to Firebase
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release.apk

      - name: Upload to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          appId: ${{ secrets.FIREBASE_APP_ID }}
          file: app-release.apk
          releaseNotes: 'Build ${{ github.run_number }} from ${{ github.ref }}'
          testers: ${{ secrets.FIREBASE_TESTERS }}

  # Summary job
  build-complete:
    name: Build Complete
    runs-on: ubuntu-latest
    needs: [validate, test, build-android, build-ios]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-android.result }}" = "failure" ] || [ "${{ needs.build-ios.result }}" = "failure" ]; then
            echo "❌ Build failed"
            exit 1
          else
            echo "✅ All builds completed successfully"
          fi
