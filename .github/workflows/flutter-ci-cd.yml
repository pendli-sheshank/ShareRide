name: Flutter CI/CD Pipeline

on:
  push:
    branches: [main, claude/kmp-vs-react-native-m51ceo]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'

      - name: Get dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Analyze
        working-directory: ./flutter_app
        run: flutter analyze

      - name: Run unit & widget tests
        working-directory: ./flutter_app
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./flutter_app/coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'

      - name: Get dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Run performance tests
        working-directory: ./flutter_app
        run: flutter test test/performance_test.dart -v

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [test, performance]
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'

      - name: Get dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: ./flutter_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release.apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: [test, performance]
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'

      - name: Get dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Build iOS
        working-directory: ./flutter_app
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          cd flutter_app/build/ios/Release-iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r app-release.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release.ipa
          path: flutter_app/build/ios/Release-iphoneos/app-release.ipa

  deploy-beta:
    name: Deploy to Firebase App Distribution
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: github.event_name == 'push' && github.ref == 'refs/heads/claude/kmp-vs-react-native-m51ceo'
    steps:
      - uses: actions/checkout@v3

      - name: Download Android APK
        uses: actions/download-artifact@v3
        with:
          name: app-release.apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          appId: ${{ secrets.FIREBASE_APP_ID }}
          file: app-release.apk
          releaseNotes: 'Beta build from CI/CD pipeline'
          testers: 'beta-testers@example.com'

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [test, performance, build-android, build-ios]
    if: always()
    steps:
      - name: Check Test Results
        run: |
          if [ "${{ needs.test.result }}" = "failure" ] || [ "${{ needs.performance.result }}" = "failure" ]; then
            echo "Build failed: Tests did not pass"
            exit 1
          fi

      - name: Build Successful
        if: success()
        run: echo "✅ All checks passed! Ready for deployment."
