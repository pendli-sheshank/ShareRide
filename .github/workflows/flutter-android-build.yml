name: Android Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.22.0'
  WORKING_DIR: flutter_app

jobs:
  validate:
    name: Validate Android Flutter Project
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Preflight Android secret check
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is required for Android release builds."
            exit 1
          fi

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Analyze code
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter analyze

      - name: Format check
        working-directory: ${{ env.WORKING_DIR }}
        run: dart format --set-exit-if-changed .

      - name: Run tests
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Create local.properties
        working-directory: ${{ env.WORKING_DIR }}/android
        run: echo "flutter.sdk=$FLUTTER_ROOT" > local.properties

      - name: Create google-services.json
        working-directory: ${{ env.WORKING_DIR }}/android/app
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cat > google-services.json <<'EOF'
            {
              "project_info": {
                "project_number": "000000000000",
                "project_id": "placeholder-project",
                "storage_bucket": "placeholder-project.appspot.com"
              },
              "client": [],
              "configuration_version": "1"
            }
            EOF
          else
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > google-services.json
          fi

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: ${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7
