name: Android Build & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.22.0'
  WORKING_DIR: flutter_app

jobs:
  validate:
    name: Validate Android Flutter Project
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Re-create Android project if missing
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ ! -d android ] || [ ! -f android/build.gradle ]; then
            echo "Android project files are missing. Re-creating Android project..."
            flutter create . --platforms=android --org com.sawaarishare
          fi

      - name: Preflight Android secret check
        if: github.event_name != 'pull_request'
        run: |
          MISSING=()
          [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ] && MISSING+=("GOOGLE_SERVICES_JSON")
          [ -z "${{ secrets.SUPABASE_URL }}" ] && MISSING+=("SUPABASE_URL")
          [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ] && MISSING+=("SUPABASE_ANON_KEY")
          [ -z "${{ secrets.KEYSTORE_FILE }}" ] && MISSING+=("KEYSTORE_FILE")
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && MISSING+=("KEYSTORE_PASSWORD")
          [ -z "${{ secrets.KEY_ALIAS }}" ] && MISSING+=("KEY_ALIAS")
          [ -z "${{ secrets.KEY_PASSWORD }}" ] && MISSING+=("KEY_PASSWORD")
          [ -z "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" ] && MISSING+=("GOOGLE_SERVICE_ACCOUNT_KEY")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode | jq -e \
            '.project_info and (.client | type == "array") and (.client | length > 0)' >/dev/null || {
            echo "::error::GOOGLE_SERVICES_JSON must be valid base64 JSON with project_info and non-empty client."
            exit 1
          }

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Analyze code
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter analyze

      - name: Format check
        working-directory: ${{ env.WORKING_DIR }}
        run: dart format --set-exit-if-changed .

      - name: Run tests
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter test

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Re-create Android project if missing
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ ! -d android ] || [ ! -f android/build.gradle ]; then
            echo "Android project files are missing. Re-creating Android project..."
            flutter create . --platforms=android --org com.sawaarishare
          fi

      - name: Create local.properties
        working-directory: ${{ env.WORKING_DIR }}/android
        run: echo "flutter.sdk=$FLUTTER_ROOT" > local.properties

      - name: Create .env file
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            printf '%s\n' \
              "SUPABASE_URL=https://placeholder.supabase.co" \
              "SUPABASE_ANON_KEY=placeholder-anon-key" \
              "FIREBASE_PROJECT_ID=placeholder-project" \
              > .env
          else
            printf '%s\n' \
              "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
              "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" \
              "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" \
              > .env
          fi

      - name: Create google-services.json
        working-directory: ${{ env.WORKING_DIR }}/android/app
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cat > google-services.json <<'EOF'
{
  "project_info": {
    "project_number": "000000000000",
    "project_id": "placeholder-project",
    "storage_bucket": "placeholder-project.appspot.com"
  },
  "client": [
    {
      "client_info": {
        "mobilesdk_app_id": "1:000000000000:android:placeholder",
        "android_client_info": {
          "package_name": "com.sawaarishare.app"
        }
      },
      "api_key": [{ "current_key": "placeholder" }]
    }
  ],
  "configuration_version": "1"
}
EOF
          else
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > google-services.json
          fi

      - name: Setup release keystore
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > /tmp/shareride.keystore
          echo "KEYSTORE_PATH=/tmp/shareride.keystore" >> $GITHUB_ENV

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Build APK (PR validation)
        if: github.event_name == 'pull_request'
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter build apk --release --target-platform android-arm64

      - name: Build AAB (release)
        if: github.event_name != 'pull_request'
        working-directory: ${{ env.WORKING_DIR }}
        env:
          KEYSTORE_PATH: /tmp/shareride.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Upload APK artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: app-pr-validation.apk
          path: ${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload AAB artifact (release)
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: ${{ env.WORKING_DIR }}/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 7

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/shareride.keystore

  deploy-play-store:
    name: Deploy to Play Store (Internal Testing)
    runs-on: ubuntu-latest
    needs: build-android
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release.aab
          path: /tmp/aab

      - name: Decode service account key
        run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" | base64 --decode > /tmp/service-account.json

      - name: Upload to Play Store (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: /tmp/service-account.json
          packageName: com.sawaarishare.app
          releaseFiles: /tmp/aab/app-release.aab
          track: internal
          status: completed
          changesNotSentForReview: true

      - name: Clean up secrets
        if: always()
        run: rm -f /tmp/service-account.json
