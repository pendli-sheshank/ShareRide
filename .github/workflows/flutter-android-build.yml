name: Android Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.22.0'
  WORKING_DIR: flutter_app

jobs:
  validate:
    name: Validate Android Flutter Project
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Preflight Android secret check
        if: github.event_name != 'pull_request'
        run: |
          MISSING=()
          [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ] && MISSING+=("GOOGLE_SERVICES_JSON")
          [ -z "${{ secrets.SUPABASE_URL }}" ] && MISSING+=("SUPABASE_URL")
          [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ] && MISSING+=("SUPABASE_ANON_KEY")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode | jq -e \
            '.project_info and (.client | type == "array") and (.client | length > 0)' >/dev/null || {
            echo "::error::GOOGLE_SERVICES_JSON must be valid base64 JSON with project_info and non-empty client."
            exit 1
          }

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Analyze code
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter analyze

      - name: Format check
        working-directory: ${{ env.WORKING_DIR }}
        run: dart format --set-exit-if-changed .

      - name: Run tests
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Create local.properties
        working-directory: ${{ env.WORKING_DIR }}/android
        run: echo "flutter.sdk=$FLUTTER_ROOT" > local.properties

      - name: Create .env file
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            printf '%s\n' \
              "SUPABASE_URL=https://placeholder.supabase.co" \
              "SUPABASE_ANON_KEY=placeholder-anon-key" \
              "FIREBASE_PROJECT_ID=placeholder-project" \
              > .env
          else
            printf '%s\n' \
              "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
              "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" \
              "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" \
              > .env
          fi

      - name: Create google-services.json
        working-directory: ${{ env.WORKING_DIR }}/android/app
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PACKAGE_NAME=$(awk '
              match($0, /applicationId[[:space:]]*=[[:space:]]*["\047]([^"\047]+)["\047]/, m) { print m[1]; exit }
            ' build.gradle build.gradle.kts 2>/dev/null)
            if [ -z "$PACKAGE_NAME" ]; then
              PACKAGE_NAME="com.placeholder.app"
            fi
            cat > google-services.json <<'EOF'
            {
              "project_info": {
                "project_number": "000000000000",
                "project_id": "placeholder-project",
                "storage_bucket": "placeholder-project.appspot.com"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:000000000000:android:placeholder",
                    "android_client_info": {
                      "package_name": "{{PACKAGE_NAME}}"
                    }
                  },
                  "api_key": [
                    {
                      "current_key": "placeholder"
                    }
                  ]
                }
              ],
              "configuration_version": "1"
            }
            EOF
            sed -i "s|{{PACKAGE_NAME}}|$PACKAGE_NAME|g" google-services.json
          else
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > google-services.json
          fi

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: ${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7
