# ONE-TIME USE WORKFLOW
#
# Generates a real iOS native project (ios/Runner.xcodeproj, Flutter/, etc.) via
# `flutter create` and opens a PR with the result, preserving the existing custom
# Podfile. Run this exactly once to bootstrap real committed native files; do NOT
# re-run after the resulting PR is merged, as it may clobber further manual
# customizations made to ios/ since the bootstrap. After merge, the "Re-create iOS
# project if missing" step in flutter-ios-build.yml becomes a true fallback that
# should never trigger in normal operation.
name: iOS Native Bootstrap (One-Time Use)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type CONFIRM to proceed - this regenerates ios/ and opens a review PR'
        required: true

permissions:
  contents: write
  pull-requests: write

env:
  FLUTTER_VERSION: '3.22.0'
  WORKING_DIR: flutter_app

jobs:
  bootstrap:
    name: Generate iOS native project
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Verify confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "CONFIRM" ]; then
            echo "::error::You must type CONFIRM to run this workflow. This is a destructive one-time bootstrap."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Backup custom Podfile
        working-directory: ${{ env.WORKING_DIR }}
        run: cp ios/Podfile /tmp/Podfile.custom.backup

      - name: Generate iOS native project
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter create . --platforms=ios --org com.sawaarishare

      - name: Restore custom Podfile
        working-directory: ${{ env.WORKING_DIR }}
        run: cp /tmp/Podfile.custom.backup ios/Podfile

      - name: Verify Podfile custom settings preserved
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euo pipefail
          for marker in "PERMISSION_CAMERA=1" "PERMISSION_LOCATION=1" "IPHONEOS_DEPLOYMENT_TARGET" "ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES" "use_modular_headers!"; do
            grep -q "$marker" ios/Podfile || { echo "::error::Podfile missing expected marker: $marker"; exit 1; }
          done

      - name: Guard against committed Firebase secrets
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euo pipefail
          if [ -f ios/Runner/GoogleService-Info.plist ]; then
            echo "::error::flutter create unexpectedly generated ios/Runner/GoogleService-Info.plist. This must not be committed."
            exit 1
          fi

      - name: Open pull request with generated iOS project
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bootstrap/ios-native-files
          commit-message: "Bootstrap real iOS native project files via flutter create"
          title: "[One-time] Bootstrap iOS native project files"
          body: |
            Auto-generated by `ios-bootstrap.yml` (workflow_dispatch, one-time use).

            This PR adds the full `ios/` native project generated via:
            `flutter create . --platforms=ios --org com.sawaarishare`

            The existing custom `ios/Podfile` (deployment target 13.0, modular
            headers workaround, camera/location permission defines) was backed
            up before generation and restored verbatim afterward.

            **Review checklist before merging:**
            - [ ] `ios/Runner.xcodeproj` bundle identifier (`PRODUCT_BUNDLE_IDENTIFIER`
                  in `ios/Runner.xcodeproj/project.pbxproj`) is `com.sawaarishare.app`
            - [ ] `ios/Podfile` still contains the custom `post_install` block
            - [ ] No `GoogleService-Info.plist` was committed (must stay CI/secret-injected)
            - [ ] `flutter-ios-build.yml` `build-ios` job passes against this branch

            **Do not re-run `ios-bootstrap.yml` after this PR merges** - see the
            workflow file header comment for why.
          labels: ios, bootstrap, needs-review
          delete-branch: true
