name: Deploy Android to Play Store

on:
  push:
    branches: [main]
    paths:
      - 'app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android production app bundle
        run: eas build --platform android --profile production --non-interactive --wait

      - name: Decode Google Play service account key
        run: echo "${GOOGLE_SERVICE_ACCOUNT_KEY}" | base64 -d > google-service-account-key.json
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Submit to Play Store (internal track)
        run: eas submit --platform android --latest --profile production --non-interactive
