name: Deploy Android → Play Store

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: internal
        type: choice
        options: [internal, alpha, beta, production]
      version_name:
        description: "Version name (e.g. 1.0.1)"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - 'androidApp/**'
      - 'shared/**'
      - '*.gradle.kts'
      - 'gradle/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git commit count used as versionCode

      # ── Java + Gradle ─────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      # ── Decode signing keystore ──────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks

      # ── Build signed AAB ─────────────────────────────────────────────────
      - name: Build release AAB
        run: gradle :androidApp:bundleRelease
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ANDROID_KEYSTORE_FILE: /tmp/release.jks
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ github.event.inputs.version_name || '1.0.0' }}

      # ── Upload to Play Store ─────────────────────────────────────────────
      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shareride.android
          releaseFiles: androidApp/build/outputs/bundle/release/androidApp-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          whatsNewDirectory: distribution/whatsnew   # optional release notes

      # ── Save AAB as artifact (14 days) ───────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sawaari-share-android-${{ github.run_number }}
          path: androidApp/build/outputs/bundle/release/*.aab
          retention-days: 14
