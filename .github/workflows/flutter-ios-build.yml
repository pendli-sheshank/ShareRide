name: iOS Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.22.0'
  WORKING_DIR: flutter_app

jobs:
  validate:
    name: Validate iOS Flutter Project
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Preflight iOS project check
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ ! -d ios/Runner.xcodeproj ] || [ ! -f ios/Podfile ]; then
            echo "::error::Missing ios project files. Ensure flutter_app/ios is committed before running this workflow."
            exit 1
          fi

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Analyze code
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter analyze

      - name: Format check
        working-directory: ${{ env.WORKING_DIR }}
        run: dart format --set-exit-if-changed .

      - name: Run tests
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter test

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    needs: validate
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: |
          pod install --repo-update

      - name: Build iOS (Release)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build ios \
            --release \
            --no-codesign

      - name: Create IPA
        run: |
          cd ${{ env.WORKING_DIR }}/build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          cd Payload
          zip -r ../app-release.ipa Runner.app >/dev/null 2>&1
          cd ..
          ls -lh app-release.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: ${{ env.WORKING_DIR }}/build/ios/Release-iphoneos/app-release.ipa
          if-no-files-found: error
          retention-days: 7
