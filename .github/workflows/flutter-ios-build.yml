name: iOS Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.22.0'
  WORKING_DIR: flutter_app

jobs:
  validate:
    name: Validate iOS Flutter Project
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Re-create iOS project if missing
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ ! -d ios/Runner.xcodeproj ] || [ ! -f ios/Podfile ]; then
            echo "iOS project files are missing. Re-creating iOS project..."
            flutter create . --platforms=ios --org com.sawaarishare
          fi

      - name: Preflight iOS secret check
        if: github.event_name != 'pull_request'
        run: |
          MISSING=()
          [ -z "${{ secrets.GOOGLESERVICE_INFO_PLIST }}" ] && MISSING+=("GOOGLESERVICE_INFO_PLIST")
          [ -z "${{ secrets.SUPABASE_URL }}" ] && MISSING+=("SUPABASE_URL")
          [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ] && MISSING+=("SUPABASE_ANON_KEY")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Analyze code
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter analyze

      - name: Format check
        working-directory: ${{ env.WORKING_DIR }}
        run: dart format --set-exit-if-changed .

      - name: Run tests
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter test

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    needs: validate
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Re-create iOS project if missing
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ ! -d ios/Runner.xcodeproj ] || [ ! -f ios/Podfile ]; then
            echo "iOS project files are missing. Re-creating iOS project..."
            flutter create . --platforms=ios --org com.sawaarishare
          fi

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Create GoogleService-Info.plist
        working-directory: ${{ env.WORKING_DIR }}/ios/Runner
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '<dict>' \
              '  <key>API_KEY</key><string>placeholder</string>' \
              '  <key>GCM_SENDER_ID</key><string>000000000000</string>' \
              '  <key>PLIST_VERSION</key><string>1</string>' \
              '  <key>BUNDLE_ID</key><string>com.placeholder.app</string>' \
              '  <key>PROJECT_ID</key><string>placeholder-project</string>' \
              '  <key>STORAGE_BUCKET</key><string>placeholder-project.appspot.com</string>' \
              '  <key>IS_ADS_ENABLED</key><false/>' \
              '  <key>IS_ANALYTICS_ENABLED</key><false/>' \
              '  <key>IS_APPINVITE_ENABLED</key><true/>' \
              '  <key>IS_GCM_ENABLED</key><true/>' \
              '  <key>IS_SIGNIN_ENABLED</key><true/>' \
              '  <key>GOOGLE_APP_ID</key><string>1:000000000000:ios:placeholder</string>' \
              '</dict>' \
              '</plist>' \
              > GoogleService-Info.plist
          else
            echo "${{ secrets.GOOGLESERVICE_INFO_PLIST }}" | base64 --decode > GoogleService-Info.plist
          fi

      - name: Create .env file
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            printf '%s\n' \
              "SUPABASE_URL=https://placeholder.supabase.co" \
              "SUPABASE_ANON_KEY=placeholder-anon-key" \
              "FIREBASE_PROJECT_ID=placeholder-project" \
              > .env
          else
            printf '%s\n' \
              "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
              "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" \
              "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" \
              > .env
          fi

      - name: Install CocoaPods dependencies
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: |
          pod install --repo-update

      - name: Verify iOS workspace
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ ! -d ios/Runner.xcworkspace ]; then
            echo "::error::ios/Runner.xcworkspace was not generated by pod install."
            exit 1
          fi

      - name: Build iOS (Release)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build ios \
            --release \
            --no-codesign

      - name: Create IPA
        run: |
          cd ${{ env.WORKING_DIR }}/build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          cd Payload
          zip -r ../app-release.ipa Runner.app >/dev/null 2>&1
          cd ..
          ls -lh app-release.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: ${{ env.WORKING_DIR }}/build/ios/Release-iphoneos/app-release.ipa
          if-no-files-found: error
          retention-days: 7
